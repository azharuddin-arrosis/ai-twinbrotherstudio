# Virtual Host: prompt.twinbrotherstudio.local
# Simpan file ini ke: /usr/local/etc/httpd/extra/vhosts/ (Homebrew)
# atau: /etc/httpd/conf.d/ (system Apache)
# lalu include di httpd.conf dengan: Include /path/to/vhosts/*.conf

<VirtualHost *:80>
    ServerName prompt.twinbrotherstudio.local
    ServerAlias www.prompt.twinbrotherstudio.local

    DocumentRoot "/Users/azharuddinarrosis/Developments/web-personal/aitutorials/public"

    <Directory "/Users/azharuddinarrosis/Developments/web-personal/aitutorials/public">
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    # PHP handler — sesuaikan versi PHP yang aktif
    # Jika pakai Homebrew PHP:
    # AddHandler application/x-httpd-php .php
    # <FilesMatch \.php$>
    #     SetHandler application/x-httpd-php
    # </FilesMatch>

    ErrorLog "/usr/local/var/log/httpd/prompt.twinbrotherstudio.local-error.log"
    CustomLog "/usr/local/var/log/httpd/prompt.twinbrotherstudio.local-access.log" combined
</VirtualHost>
